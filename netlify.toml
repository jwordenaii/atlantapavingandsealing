[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options             = "DENY"
    X-Content-Type-Options      = "nosniff"
    Strict-Transport-Security   = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 301 redirects from common short URLs
[[redirects]]
  from = "/charlotte-paving"
  to   = "/charlotte-asphalt-paving"
  status = 301

[[redirects]]
  from = "/rock-hill-paving"
  to   = "/rock-hill-asphalt-paving"
  status = 301

[[redirects]]
  from = "/york-paving"
  to   = "/york-sc-asphalt-paving"
  status = 301

[[redirects]]
  from = "/indian-land-paving"
  to   = "/indian-land-asphalt-paving"
  status = 301

[[redirects]]
  from = "/fort-mill-paving"
  to   = "/fort-mill-asphalt-paving"
  status = 301

[[redirects]]
  from = "/asphalt-paving-charlotte-nc"
  to   = "/charlotte-asphalt-paving"
  status = 301

[[redirects]]
  from = "/asphalt-paving-rock-hill-sc"
  to   = "/rock-hill-asphalt-paving"
  status = 301

[[redirects]]
  from = "/atlanta-*"
  to   = "/"
  status = 301

[[redirects]]
  from = "/marietta-*"
  to   = "/"
  status = 301

[[redirects]]
  from = "/savannah-*"
  to   = "/"
  status = 301

# SPA fallback - all app routes served by index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
