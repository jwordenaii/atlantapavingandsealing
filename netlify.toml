[build]
  publish = "."

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# 301 redirects from old short URLs to actual folder paths

[[redirects]]
  from = "/atlanta-paving"
  to = "/atlanta-asphalt-paving/"
  status = 301
  force = true

